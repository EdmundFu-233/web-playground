<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Theme Toggle</title>
<style>:root{--bg:#0a0a0f;--bg-card:#12121a;--text:#e8e8f0;--text-muted:#8888a0;--border:#2a2a3e}.light{--bg:#f5f5f7;--bg-card:#ffffff;--text:#1d1d1f;--text-muted:#86868b;--border:#d2d2d7}*{transition:background-color 0.3s,color 0.3s,border-color 0.3s}body{font-family:system-ui;background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh}.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:2rem;max-width:400px;text-align:center}.toggle{padding:0.6rem 1.2rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;margin-top:1rem}.toggle:hover{border-color:#6c63ff}p{color:var(--text-muted);margin-top:0.5rem}
</style></head><body><div class="card"><h1>Theme Demo</h1><p>Click the button to toggle between dark and light mode.</p><button class="toggle" id="themeToggle">Switch to Light Mode</button></div>
<script>const html=document.documentElement;const saved=localStorage.getItem('theme');if(saved==='light')html.classList.add('light');
document.getElementById('themeToggle').onclick=()=>{html.classList.toggle('light');localStorage.setItem('theme',html.classList.contains('light')?'light':'dark');
document.getElementById('themeToggle').textContent=html.classList.contains('light')?'Switch to Dark Mode':'Switch to Light Mode';}</script></body></html>
