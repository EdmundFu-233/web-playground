<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Modal Demo</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:system-ui;background:#0a0a0f;color:#e8e8f0;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.btn{padding:0.8rem 2rem;background:#6c63ff;color:white;border:none;border-radius:8px;font-size:1rem;cursor:pointer;transition:background 0.2s;}
.btn:hover{background:#8b83ff;}.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;z-index:1000;}
.overlay.open{display:flex;}.modal{background:#12121a;border:1px solid #2a2a3e;border-radius:12px;padding:2rem;max-width:500px;width:90%;}
.modal h2{margin-bottom:1rem;color:#6c63ff;}.modal p{color:#8888a0;margin-bottom:1.5rem;line-height:1.6;}
.modal-close{padding:0.5rem 1.5rem;background:#2a2a3e;color:#e8e8f0;border:none;border-radius:6px;cursor:pointer;}
</style></head><body><button class="btn" id="openModal">Open Modal</button>
<div class="overlay" id="modal"><div class="modal"><h2>Modal Title</h2><p>This is a modal dialog.</p><button class="modal-close" id="closeModal">Close</button></div></div>
<script>const modal=document.getElementById('modal');document.getElementById('openModal').onclick=()=>modal.classList.add('open');
document.getElementById('closeModal').onclick=()=>modal.classList.remove('open');modal.onclick=(e)=>{if(e.target===modal)modal.classList.remove('open');};</script></body></html>
