<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tabs</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:system-ui;background:#0a0a0f;color:#e8e8f0;padding:3rem;display:flex;justify-content:center;}
.tabs{max-width:600px;width:100%;}.tab-nav{display:flex;gap:0;border-bottom:2px solid #2a2a3e;}
.tab-btn{padding:0.8rem 1.5rem;background:none;border:none;color:#8888a0;cursor:pointer;font-size:1rem;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;}
.tab-btn:hover{color:#e8e8f0;}.tab-btn.active{color:#6c63ff;border-bottom-color:#6c63ff;}
.tab-content{padding:1.5rem 0;}.tab-panel{display:none;color:#8888a0;line-height:1.6;}
.tab-panel.active{display:block;}</style></head><body><div class="tabs"><div class="tab-nav"><button class="tab-btn active" data-tab="1">Tab 1</button>
<button class="tab-btn" data-tab="2">Tab 2</button><button class="tab-btn" data-tab="3">Tab 3</button></div>
<div class="tab-content"><div class="tab-panel active" id="tab-1"><p>Content for tab 1.</p></div>
<div class="tab-panel" id="tab-2"><p>Content for tab 2.</p></div><div class="tab-panel" id="tab-3"><p>Content for tab 3.</p></div></div></div>
<script>document.querySelectorAll('.tab-btn').forEach(btn=>{btn.onclick=()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
btn.classList.add('active');document.getElementById('tab-'+btn.dataset.tab).classList.add('active');};});</script></body></html>
