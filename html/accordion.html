<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Accordion</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:system-ui;background:#0a0a0f;color:#e8e8f0;display:flex;justify-content:center;padding:3rem;}
.accordion{max-width:600px;width:100%;}.accordion-item{border:1px solid #2a2a3e;border-radius:8px;margin-bottom:0.5rem;overflow:hidden;}
.accordion-header{background:#12121a;padding:1rem 1.5rem;cursor:pointer;font-weight:600;display:flex;justify-content:space-between;align-items:center;transition:background 0.2s;}
.accordion-header:hover{background:#1a1a2e;}.accordion-header .arrow{transition:transform 0.3s;}.accordion-header.active .arrow{transform:rotate(180deg);}
.accordion-content{padding:0 1.5rem;max-height:0;overflow:hidden;transition:max-height 0.3s, padding 0.3s;background:#12121a;}
.accordion-content.active{max-height:200px;padding:1rem 1.5rem;color:#8888a0;}
</style></head><body><div class="accordion"><div class="accordion-item"><div class="accordion-header">Section 1 <span class="arrow">▼</span></div>
<div class="accordion-content"><p>Content for section 1.</p></div></div><div class="accordion-item"><div class="accordion-header">Section 2 <span class="arrow">▼</span></div>
<div class="accordion-content"><p>Content for section 2.</p></div></div><div class="accordion-item"><div class="accordion-header">Section 3 <span class="arrow">▼</span></div>
<div class="accordion-content"><p>Content for section 3.</p></div></div></div>
<script>document.querySelectorAll('.accordion-header').forEach(h=>{h.onclick=()=>{h.classList.toggle('active');h.nextElementSibling.classList.toggle('active');}});</script></body></html>
