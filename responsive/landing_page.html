<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Landing Page</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:system-ui;background:#0a0a0f;color:#e8e8f0;}
nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;background:#12121a;border-bottom:1px solid #2a2a3e;}
.logo{font-weight:700;font-size:1.2rem;color:#6c63ff;}.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:#8888a0;text-decoration:none;}.nav-links a:hover{color:#e8e8f0;}
.hero{text-align:center;padding:6rem 2rem;max-width:800px;margin:0 auto;}
.hero h1{font-size:3rem;font-weight:800;margin-bottom:1rem;background:linear-gradient(135deg,#e8e8f0,#6c63ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:1.2rem;color:#8888a0;margin-bottom:2rem;max-width:600px;margin-left:auto;margin-right:auto;}
.btn{padding:0.8rem 2rem;background:#6c63ff;color:white;border:none;border-radius:8px;font-size:1rem;cursor:pointer;text-decoration:none;display:inline-block;transition:background 0.2s;}
.btn:hover{background:#8b83ff;}.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;padding:2rem;max-width:1000px;margin:0 auto;}
.feature{text-align:center;padding:2rem;background:#12121a;border:1px solid #2a2a3e;border-radius:12px;}
.feature .icon{font-size:2.5rem;margin-bottom:1rem;}.feature h3{margin-bottom:0.5rem;}.feature p{color:#8888a0;font-size:0.9rem;}
@media(max-width:600px){.hero h1{font-size:2rem;}.nav-links{display:none;}}
</style></head><body><nav><div class="logo">Product</div><ul class="nav-links"><li><a href="#">Features</a></li>
<li><a href="#">Pricing</a></li><li><a href="#">About</a></li><li><a href="#">Contact</a></li></ul></nav>
<section class="hero"><h1>Build Something Amazing</h1><p>A modern platform for modern teams.</p><a href="#" class="btn">Get Started</a></section>
<section class="features"><div class="feature"><div class="icon">⚡</div><h3>Fast</h3><p>Lightning quick performance</p></div>
<div class="feature"><div class="icon">🔒</div><h3>Secure</h3><p>Enterprise-grade security</p></div><div class="feature"><div class="icon">🌍</div><h3>Global</h3><p>Available worldwide</p></div></section></body></html>
