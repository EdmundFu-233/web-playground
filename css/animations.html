<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CSS Animations</title><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0f; flex-wrap: wrap; gap: 3rem; padding: 2rem; }
.box { width: 100px; height: 100px; border-radius: 12px; }
.pulse { background: #6c63ff; animation: pulse 2s infinite; }
@keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
.spin { background: #4ade80; animation: spin 3s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.bounce { background: #f59e0b; animation: bounce 1s infinite; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
.shimmer { background: #ef4444; position: relative; overflow: hidden; }
.shimmer::after { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shimmer 2s infinite; }
@keyframes shimmer { 100% { left: 100%; } }
</style></head><body><div class="box pulse"></div><div class="box spin"></div><div class="box bounce"></div><div class="box shimmer"></div></body></html>
