<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Flexbox Nav</title><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui; background: #0a0a0f; color: #e8e8f0; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: #12121a; border-bottom: 1px solid #2a2a3e; }
.logo { font-size: 1.3rem; font-weight: 700; color: #6c63ff; }
.links { display: flex; gap: 2rem; list-style: none; }
.links a { color: #8888a0; text-decoration: none; transition: color 0.2s; }
.links a:hover { color: #e8e8f0; }
main { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
.hero { text-align: center; padding: 4rem 0; }
.hero h1 { font-size: 3rem; margin-bottom: 1rem; }
.hero p { color: #8888a0; font-size: 1.2rem; }
@media (max-width: 600px) { nav { flex-direction: column; gap: 1rem; }
.links { flex-direction: column; text-align: center; gap: 0.8rem; } }
</style></head><body><nav><div class="logo">Logo</div><ul class="links"><li><a href="#">Home</a></li>
<li><a href="#">About</a></li><li><a href="#">Projects</a></li><li><a href="#">Contact</a></li></ul></nav>
<main><div class="hero"><h1>Welcome</h1><p>Responsive navigation with Flexbox</p></div></main></body></html>
